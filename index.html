<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BDT Wallet — Bank & Cash Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f7; font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif; padding: 20px 16px; color: #1c1c1e; }
        .app-container { max-width: 1280px; margin: 0 auto; background: #ffffff; border-radius: 48px; box-shadow: 0 12px 40px rgba(0,0,0,0.08), 0 0 0 0.5px rgba(0,0,0,0.02); overflow: hidden; }
        .container-inner { padding: 24px 22px 32px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; margin-bottom: 28px; padding-bottom: 8px; border-bottom: 0.5px solid #e9ecef; }
        .title-section h1 { font-size: 1.85rem; font-weight: 620; background: linear-gradient(135deg, #1c2e3a, #2c6e3c); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: -0.3px; }
        .title-section p { font-size: 0.75rem; color: #8e8e93; }
        .status-group { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
        .sync-badge { background: #e9e9ef; padding: 6px 16px; border-radius: 40px; font-size: 0.72rem; font-weight: 510; }
        .last-mod { font-size: 0.65rem; color: #8e8e93; background: #f8f8fc; padding: 4px 14px; border-radius: 40px; }
        .action-buttons { display: flex; gap: 8px; margin-top: 4px; }
        .icon-btn { background: #f2f2f7; border: none; padding: 6px 14px; border-radius: 32px; font-size: 0.7rem; font-weight: 500; color: #007aff; cursor: pointer; }
        .balance-pill { background: #1c2e3a; padding: 8px 24px; border-radius: 48px; color: white; text-align: center; font-weight: 500; }
        .balance-pill span { font-size: 1.6rem; font-weight: 700; }
        .money-split { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
        .bank-card, .cash-card { flex: 1; background: #f8f9fc; border-radius: 32px; padding: 18px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.02), 0 0 0 1px rgba(0,0,0,0.02); transition: all 0.2s ease; }
        .bank-card { border-left: 5px solid #007aff; }
        .cash-card { border-left: 5px solid #34c759; }
        .money-label { font-size: 0.85rem; font-weight: 500; color: #6c6c70; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .money-amount { font-size: 2rem; font-weight: 700; color: #1c1c1e; letter-spacing: -0.5px; }
        .money-amount small { font-size: 0.9rem; font-weight: 500; color: #8e8e93; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }
        .card { background: #ffffff; border-radius: 32px; padding: 20px; box-shadow: 0 4px 14px rgba(0,0,0,0.02), 0 0 0 1px rgba(0,0,0,0.02); }
        .card-title { font-size: 1.35rem; font-weight: 590; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; padding-left: 10px; border-left: 5px solid; }
        .income-title { border-left-color: #34c759; }
        .expense-title { border-left-color: #ff3b30; }
        .form-stack { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
        .form-row { display: flex; flex-wrap: wrap; gap: 12px; }
        .form-row select, .form-row input { flex: 1; min-width: 130px; }
        select, input, .apple-btn { background: #f9f9fb; border: 1px solid #e3e4e8; border-radius: 44px; padding: 14px 18px; font-size: 0.9rem; font-family: inherit; outline: none; }
        select:focus, input:focus { border-color: #007aff; background: white; box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
        .apple-btn { background: #007aff; color: white; border: none; font-weight: 600; cursor: pointer; text-align: center; }
        .apple-btn:active { transform: scale(0.97); background: #005fc1; }
        .apple-btn:disabled { background: #a9c0e6; opacity: 0.65; cursor: not-allowed; transform: none; }
        .stats-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .chip { background: #f2f2f7; border-radius: 40px; padding: 8px 16px; font-size: 0.75rem; font-weight: 500; }
        .report-chart-flex { display: flex; flex-wrap: wrap; gap: 24px; margin-top: 8px; }
        .report-panel { flex: 2; min-width: 260px; background: #ffffff; border-radius: 36px; box-shadow: 0 4px 14px rgba(0,0,0,0.02), 0 0 0 1px rgba(0,0,0,0.02); overflow: hidden; }
        .chart-panel { flex: 1.5; min-width: 260px; background: #ffffff; border-radius: 36px; padding: 20px 18px; box-shadow: 0 4px 14px rgba(0,0,0,0.02), 0 0 0 1px rgba(0,0,0,0.02); }
        @media (max-width: 800px) { .report-chart-flex { flex-direction: column; } }
        .filter-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; padding: 20px 20px 8px 20px; gap: 12px; }
        .segment { display: flex; gap: 8px; background: #f2f2f7; border-radius: 60px; padding: 4px; flex-wrap: wrap; }
        .segment-btn { background: transparent; border: none; padding: 8px 18px; border-radius: 40px; font-size: 0.8rem; font-weight: 500; cursor: pointer; }
        .segment-btn.active { background: #ffffff; color: #007aff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .type-filter { display: flex; gap: 8px; background: #f2f2f7; border-radius: 60px; padding: 4px; }
        .type-btn { background: transparent; border: none; padding: 6px 16px; border-radius: 40px; font-size: 0.75rem; font-weight: 500; cursor: pointer; }
        .type-btn.active-type { background: #ffffff; color: #007aff; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .table-wrap { overflow-x: auto; padding: 0 16px 20px 16px; }
        .transaction-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .transaction-table th { text-align: left; padding: 14px 6px; color: #6c6c70; font-weight: 510; border-bottom: 0.5px solid #e9ecef; }
        .transaction-table td { padding: 12px 6px; border-bottom: 0.5px solid #f0f0f4; }
        .income-row { background-color: rgba(52,199,89,0.04); }
        .expense-row { background-color: rgba(255,59,48,0.04); }
        .mini-btn { background: none; border: none; font-size: 0.7rem; font-weight: 590; padding: 6px 12px; border-radius: 32px; margin: 0 3px; cursor: pointer; }
        .edit-mini { background: #e9e9ef; color: #007aff; }
        .delete-mini { background: #e9e9ef; color: #ff3b30; }
        .save-mini { background: #34c759; color: white; }
        .cancel-mini { background: #e9e9ef; color: #8e8e93; }
        .period-stats { display: flex; justify-content: center; gap: 16px; margin: 12px 20px 20px; flex-wrap: wrap; }
        canvas { width: 100% !important; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 16px; margin: 20px 20px 20px; padding-top: 8px; border-top: 0.5px solid #e9ecef; }
        .page-btn { background: #f2f2f7; border: none; padding: 8px 16px; border-radius: 32px; font-weight: 500; font-size: 0.8rem; cursor: pointer; transition: all 0.1s; }
        .page-btn:active { transform: scale(0.96); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .page-info { font-size: 0.75rem; font-weight: 500; color: #1c1c1e; background: #f8f8fc; padding: 6px 16px; border-radius: 30px; }
        .footer-note { font-size: 0.65rem; text-align: center; color: #8e8e93; border-top: 0.5px solid #e9ecef; margin-top: 32px; padding-top: 20px; }

        /* ── CATEGORY FILTER SECTION ── */
        .cat-filter-section { background: #ffffff; border-radius: 36px; padding: 24px; box-shadow: 0 4px 14px rgba(0,0,0,0.02), 0 0 0 1px rgba(0,0,0,0.02); margin-bottom: 32px; }
        .cat-filter-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .cat-filter-header h3 { font-size: 1.2rem; font-weight: 590; }
        .cat-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .cat-period-seg { display: flex; gap: 6px; background: #f2f2f7; border-radius: 60px; padding: 4px; }
        .cat-period-btn { background: transparent; border: none; padding: 7px 16px; border-radius: 40px; font-size: 0.75rem; font-weight: 500; cursor: pointer; }
        .cat-period-btn.active { background: #ffffff; color: #007aff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cat-type-seg { display: flex; gap: 6px; background: #f2f2f7; border-radius: 60px; padding: 4px; }
        .cat-type-btn { background: transparent; border: none; padding: 7px 14px; border-radius: 40px; font-size: 0.75rem; font-weight: 500; cursor: pointer; }
        .cat-type-btn.active { background: #ffffff; color: #007aff; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .cat-content { display: flex; flex-wrap: wrap; gap: 20px; }
        .cat-chart-wrap { flex: 1.2; min-width: 240px; position: relative; }
        .cat-chart-wrap canvas { max-height: 300px; }
        .cat-breakdown { flex: 2; min-width: 260px; }
        .cat-breakdown-title { font-size: 0.8rem; font-weight: 590; color: #6c6c70; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .cat-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid #f0f0f4; cursor: pointer; transition: background 0.15s; border-radius: 12px; padding: 10px 8px; }
        .cat-row:hover { background: #f8f9fc; }
        .cat-row.selected-cat { background: #f0f7ff; }
        .cat-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .cat-name { flex: 1; font-size: 0.82rem; font-weight: 500; }
        .cat-bar-wrap { flex: 2; height: 6px; background: #f2f2f7; border-radius: 40px; overflow: hidden; }
        .cat-bar-fill { height: 100%; border-radius: 40px; transition: width 0.4s ease; }
        .cat-amount { font-size: 0.82rem; font-weight: 600; min-width: 80px; text-align: right; }
        .cat-pct { font-size: 0.7rem; color: #8e8e93; min-width: 36px; text-align: right; }
        .cat-sub-section { margin-top: 16px; background: #f8f9fc; border-radius: 20px; padding: 14px 16px; display: none; }
        .cat-sub-section.visible { display: block; }
        .cat-sub-title { font-size: 0.75rem; font-weight: 590; color: #6c6c70; margin-bottom: 10px; }
        .sub-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 0.78rem; border-bottom: 0.5px solid #ebebef; }
        .sub-row:last-child { border-bottom: none; }
        .cat-summary-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        .cat-empty { text-align: center; color: #8e8e93; font-size: 0.85rem; padding: 32px; }

        /* ── TRANSFER CARD ── */
        .transfer-card { background: linear-gradient(135deg, #f0f4ff 0%, #f0fff4 100%); border-radius: 32px; padding: 22px 24px; margin-bottom: 28px; box-shadow: 0 4px 14px rgba(0,0,0,0.03), 0 0 0 1px rgba(0,0,0,0.03); }
        .transfer-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .transfer-body { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .transfer-from-to { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 260px; }
        .transfer-badge { flex: 1; background: #fff; border-radius: 20px; padding: 12px 16px; text-align: center; font-weight: 600; font-size: 0.88rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); min-width: 90px; }
        .transfer-badge.bank-b { color: #007aff; border: 2px solid #c8deff; }
        .transfer-badge.cash-b { color: #34c759; border: 2px solid #c2f0ce; }
        .transfer-badge small { display: block; font-size: 0.65rem; color: #8e8e93; font-weight: 400; margin-top: 2px; }
        .transfer-arrow-btn { background: #1c2e3a; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.35s cubic-bezier(.68,-0.55,.27,1.55), background 0.2s; box-shadow: 0 4px 12px rgba(28,46,58,0.25); }
        .transfer-arrow-btn:hover { background: #007aff; }
        .transfer-arrow-btn.flipped { transform: rotate(180deg); }
        .transfer-inputs { display: flex; gap: 10px; flex: 1.5; min-width: 240px; flex-wrap: wrap; }
        .transfer-inputs input { flex: 1; min-width: 120px; }
        .transfer-btn { background: linear-gradient(135deg, #007aff, #34c759); color: white; border: none; border-radius: 44px; padding: 14px 28px; font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap; box-shadow: 0 4px 14px rgba(0,122,255,0.25); transition: opacity 0.2s, transform 0.15s; }
        .transfer-btn:active { transform: scale(0.96); }
        .transfer-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        .transfer-error { font-size: 0.75rem; color: #ff3b30; margin-top: 8px; min-height: 18px; }
        .transfer-row { background-color: rgba(120,80,255,0.05) !important; }

        @media (max-width: 700px) {
            body { padding: 8px; }
            .app-container { border-radius: 28px; }
            .container-inner { padding: 16px 12px 24px; }
            .two-col { grid-template-columns: 1fr; gap: 16px; }
            .header-row { flex-direction: column; align-items: stretch; gap: 10px; }
            .status-group { align-items: flex-start; }
            .balance-pill { align-self: stretch; text-align: center; }
            .segment { flex-wrap: nowrap; overflow-x: auto; }
            .segment-btn { padding: 6px 11px; font-size: 0.68rem; white-space: nowrap; }
            .type-btn { padding: 5px 10px; font-size: 0.68rem; }
            .money-amount { font-size: 1.4rem; }
            .cat-content { flex-direction: column; }
            .transfer-body { flex-direction: column; align-items: stretch; }
            .transfer-from-to { min-width: unset; }
            .transfer-inputs { min-width: unset; }
            .transfer-btn { width: 100%; }
            /* Chart: fixed height, no clip */
            .chart-panel { padding: 16px 12px; }
            .chart-panel canvas { max-height: 220px !important; height: 220px !important; }
            /* Hide table on mobile, show cards instead */
            .transaction-table { display: none; }
            .tx-cards { display: flex; flex-direction: column; gap: 10px; padding: 0 4px 8px; }
            .filter-bar { padding: 14px 12px 8px; gap: 8px; }
            .period-stats { margin: 8px 12px 16px; gap: 8px; }
            .pagination { margin: 12px; gap: 10px; }
        }
        @media (min-width: 701px) {
            .tx-cards { display: none; }
        }
        /* Mobile transaction cards */
        .tx-card { background: #fff; border-radius: 18px; padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03); }
        .tx-card.income-card { border-left: 4px solid #34c759; }
        .tx-card.expense-card { border-left: 4px solid #ff3b30; }
        .tx-card.transfer-card-row { border-left: 4px solid #7b5cf5; }
        .tx-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .tx-card-label { font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
        .tx-card-label.inc { background: #e6f9ed; color: #1a8c3a; }
        .tx-card-label.exp { background: #ffeeed; color: #c0392b; }
        .tx-card-label.trf { background: #f0ecff; color: #5b21b6; }
        .tx-card-amount { font-size: 1.05rem; font-weight: 700; color: #1c1c1e; }
        .tx-card-meta { font-size: 0.72rem; color: #6c6c70; margin-bottom: 10px; }
        .tx-card-actions { display: flex; gap: 8px; }
        .tx-card-actions button { flex: 1; padding: 9px 0; border-radius: 12px; font-size: 0.75rem; font-weight: 600; border: none; cursor: pointer; }
        .tx-edit-btn { background: #e9f1ff; color: #007aff; }
        .tx-del-btn  { background: #ffeceb; color: #ff3b30; }
        .tx-save-btn { background: #34c759; color: white; }
        .tx-cancel-btn { background: #e9e9ef; color: #636366; }
        /* Edit mode card inputs */
        .tx-edit-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .tx-edit-row input { flex: 1; min-width: 100px; background: #f9f9fb; border: 1px solid #e3e4e8; border-radius: 12px; padding: 10px 12px; font-size: 0.85rem; font-family: inherit; outline: none; }
        .tx-edit-row input:focus { border-color: #007aff; }
</head>
<body>
<div class="app-container">
    <div class="container-inner">
        <div class="header-row">
            <div class="title-section">
                <h1>💰 BDT Wallet</h1>
                <p>Income · DPS · FDR · Savings · Expenses</p>
            </div>
            <div class="status-group">
                <div class="sync-badge" id="syncStatus">☁️ ready</div>
                <div class="last-mod" id="lastModifiedDisplay">last sync —</div>
                <div class="action-buttons">
                    <button id="forceSyncBtn" class="icon-btn">⟳ Sync now</button>
                    <button id="exportBtn" class="icon-btn">📎 Export</button>
                    <button id="importBtn" class="icon-btn">📂 Import</button>
                </div>
            </div>
            <div class="balance-pill">💰 Total: <span id="totalBalance">0</span> ৳</div>
        </div>

        <div class="money-split">
            <div class="bank-card">
                <div class="money-label">🏦 Bank Account</div>
                <div class="money-amount"><span id="bankAmount">0</span> <small>৳</small></div>
                <div style="font-size:0.7rem; color:#8e8e93; margin-top: 8px;">available balance</div>
            </div>
            <div class="cash-card">
                <div class="money-label">💵 Cash in Hand</div>
                <div class="money-amount"><span id="cashAmount">0</span> <small>৳</small></div>
                <div style="font-size:0.7rem; color:#8e8e93; margin-top: 8px;">available cash</div>
            </div>
        </div>

        <!-- ══ TRANSFER SECTION ══ -->
        <div class="transfer-card">
            <div class="transfer-title">🔄 Transfer Money</div>
            <div class="transfer-body">
                <div class="transfer-from-to">
                    <div class="transfer-badge bank-b" id="transferFromBadge">
                        🏦 Bank
                        <small>From</small>
                    </div>
                    <button class="transfer-arrow-btn" id="transferSwapBtn" title="Swap direction">⇄</button>
                    <div class="transfer-badge cash-b" id="transferToBadge">
                        💵 Cash
                        <small>To</small>
                    </div>
                </div>
                <div class="transfer-inputs">
                    <input type="number" id="transferAmount" placeholder="Amount (BDT)" min="1">
                    <input type="date" id="transferDate">
                </div>
                <button class="transfer-btn" id="doTransferBtn" disabled>↗ Transfer</button>
            </div>
            <div class="transfer-error" id="transferError"></div>
        </div>
        <!-- ══ END TRANSFER ══ -->

        <div class="two-col">
            <div class="card">
                <div class="card-title income-title">📈 Add Income</div>
                <div class="form-stack">
                    <div class="form-row"><select id="incomeCategory"><option value="" disabled selected>Category</option><option value="Office">🏢 Office</option><option value="Tuition">📚 Tuition</option><option value="DPS">🏦 DPS</option><option value="FDR">📈 FDR</option><option value="Saving">💰 Saving Account</option><option value="OtherIncome">📌 Other Income</option></select>
                    <select id="incomeSubCat"><option value="" disabled selected>Sub‑category</option></select></div>
                    <div class="form-row"><input type="number" id="incomeAmount" placeholder="Amount (BDT)"><select id="incomeLocation"><option value="Bank">🏦 Bank</option><option value="Cash">💵 Cash</option></select><input type="date" id="incomeDate"></div>
                    <button id="addIncomeBtn" class="apple-btn">➕ Add Income</button>
                </div>
                <div class="stats-chips"><div class="chip">💰 Total Income: <span id="totalIncomeSum">0</span> ৳</div><div class="chip">🏦 Bank: <span id="bankTotal">0</span> ৳</div><div class="chip">💵 Cash: <span id="cashTotal">0</span> ৳</div></div>
            </div>
            <div class="card">
                <div class="card-title expense-title">📉 Add Expense</div>
                <div class="form-stack">
                    <div class="form-row"><select id="expenseCategory"><option value="" disabled selected>Category</option><option value="Treatment">🏥 Treatment</option><option value="Bike">🏍️ Bike</option><option value="Transport">🚌 Transport</option><option value="Food">🍔 Food</option><option value="Education">📖 Education</option><option value="Investment">📈 Investment</option><option value="Pocket Money">👝 Pocket Money</option><option value="Furniture">🛋️ Furniture</option><option value="Pet">🐾 Pet</option><option value="Household Product">🧴 Household</option><option value="Bills">⚡ Bills</option><option value="Clothing">👕 Clothing</option><option value="Gadget">📱 Gadget</option><option value="Other">📌 Other</option></select>
                    <select id="expenseSubCat"><option value="" disabled selected>Sub‑category</option></select></div>
                    <div class="form-row"><input type="number" id="expenseAmount" placeholder="Amount (BDT)"><select id="expenseMethod"><option value="Bank">🏦 Bank</option><option value="Cash">💵 Cash</option></select><input type="date" id="expenseDate"></div>
                    <button id="addExpenseBtn" class="apple-btn">➖ Add Expense</button>
                </div>
                <div class="stats-chips"><div class="chip">💸 Total Expense: <span id="totalExpenseSum">0</span> ৳</div></div>
            </div>
        </div>

        <!-- ══ CATEGORY FILTER SECTION ══ -->
        <div class="cat-filter-section">
            <div class="cat-filter-header">
                <h3>🗂️ Category Breakdown</h3>
                <div class="cat-controls">
                    <div class="cat-period-seg">
                        <button data-cat-period="daily"   class="cat-period-btn">Daily</button>
                        <button data-cat-period="weekly"  class="cat-period-btn">Weekly</button>
                        <button data-cat-period="monthly" class="cat-period-btn">Monthly</button>
                        <button data-cat-period="yearly"  class="cat-period-btn active">Yearly</button>
                    </div>
                    <div class="cat-type-seg">
                        <button data-cat-type="expense" class="cat-type-btn active">📉 Expense</button>
                        <button data-cat-type="income"  class="cat-type-btn">📈 Income</button>
                    </div>
                </div>

<script>
    const GITHUB_USERNAME = "sufi-e";
    const GITHUB_REPO = "bdt-money-manager";
    let transactions = [];
    let currentPeriod = "yearly";
    let currentTypeFilter = "all";
    let editModeId = null;
    let barChart = null;
    let catPieChart = null;
    let currentPage = 1;
    const PAGE_SIZE = 10;

    // Category filter state
    let catPeriod = "yearly";
    let catType = "expense";
    let selectedCatName = null;

    const INCOME_COLORS = ["#34c759","#007aff","#5ac8fa","#af52de","#ff9f0a","#ff6b6b","#30d158","#64d2ff"];
    const EXPENSE_COLORS = ["#ff3b30","#ff9500","#ff6b35","#ffcc02","#ff2d55","#ac8e68","#636366","#8e8e93","#ff6b6b","#d4a017","#e74c3c","#c0392b","#e67e22","#16a085"];

    const incomeSubMap = { "Office": ["Salary","Bonus","Gift"], "Tuition": ["Coaching","Student"], "DPS": ["Monthly Deposit","Interest","Matured"], "FDR": ["Interest","Renewal","Matured"], "Saving": ["Interest","Deposit","Withdrawal"], "OtherIncome": ["Dividend","Gift","Refund","Misc"] };
    const expenseSubMap = { "Treatment": ["Medicine","Medical","Medical Equipment"], "Bike": ["Fuel","Engine Oil","Servicing"], "Transport": ["Bus","Train","CNG","Uber","Other"], "Food": ["For Home","Restaurant","Others"], "Education": ["Tuition Fee","Books","Stationery","Course Fee"], "Investment": ["DPS","FDR","Life Insurance"], "Pocket Money": ["Mother","Father","Wife","Other"], "Furniture": ["Sofa","Table","Bed","Chair","Almirah","Other"], "Pet": ["Food","Litter","Medicine","Other"], "Household Product": ["Cleaning","Kitchen","Bathroom","Laundry","Other"], "Bills": ["Internet Bill","Electricity Bill","Gas Bill","Water Bill","Mobile Bill","Others"], "Clothing": ["Myself","Others"], "Gadget": ["Phone","Laptop","Tablet","Headphone","Accessories","Other"], "Other": ["Miscellaneous"] };

    function updateIncomeSubCat() { const main=document.getElementById("incomeCategory").value; const sub=document.getElementById("incomeSubCat"); sub.innerHTML='<option value="" disabled selected>Sub‑category</option>'; if(main&&incomeSubMap[main]) incomeSubMap[main].forEach(opt=>{let o=document.createElement("option"); o.value=opt; o.textContent=opt; sub.appendChild(o);}); }
    function updateExpenseSubCat() { const main=document.getElementById("expenseCategory").value; const sub=document.getElementById("expenseSubCat"); sub.innerHTML='<option value="" disabled selected>Sub‑category</option>'; if(main&&expenseSubMap[main]) expenseSubMap[main].forEach(opt=>{let o=document.createElement("option"); o.value=opt; o.textContent=opt; sub.appendChild(o);}); }
    function checkIncomeValid() { const cat=document.getElementById("incomeCategory").value,sub=document.getElementById("incomeSubCat").value,amt=parseFloat(document.getElementById("incomeAmount").value),date=document.getElementById("incomeDate").value; document.getElementById("addIncomeBtn").disabled = !(cat && sub && amt>0 && date); }
    function checkExpenseValid() { const cat=document.getElementById("expenseCategory").value,sub=document.getElementById("expenseSubCat").value,amt=parseFloat(document.getElementById("expenseAmount").value),date=document.getElementById("expenseDate").value; document.getElementById("addExpenseBtn").disabled = !(cat && sub && amt>0 && date); }

    function calculateBankCashBalance() { let bank=0,cash=0; transactions.forEach(t=>{ if(t.type==="income"){if(t.locationOrMethod==="Bank") bank+=t.amount; else if(t.locationOrMethod==="Cash") cash+=t.amount;} else if(t.type==="expense"){if(t.locationOrMethod==="Bank") bank-=t.amount; else cash-=t.amount;} else if(t.type==="transfer"){ if(t.locationOrMethod==="Bank"&&t.transferTo==="Cash"){bank-=t.amount; cash+=t.amount;} else if(t.locationOrMethod==="Cash"&&t.transferTo==="Bank"){cash-=t.amount; bank+=t.amount;} } }); return {bankBalance:bank, cashBalance:cash}; }
    function updateBankCashUI() { const {bankBalance,cashBalance}=calculateBankCashBalance(); document.getElementById("bankAmount").innerText=bankBalance.toLocaleString(); document.getElementById("cashAmount").innerText=cashBalance.toLocaleString(); }
    function updateStatsUI() { let totalInc=0,totalExp=0,bankTotal=0,cashTotal=0; transactions.forEach(t=>{ if(t.type==="income"){totalInc+=t.amount; if(t.locationOrMethod==="Bank") bankTotal+=t.amount; else if(t.locationOrMethod==="Cash") cashTotal+=t.amount;} else if(t.type==="expense"){totalExp+=t.amount;} /* transfers skipped — they don't change net worth */ }); document.getElementById("totalIncomeSum").innerText=totalInc.toLocaleString(); document.getElementById("totalExpenseSum").innerText=totalExp.toLocaleString(); document.getElementById("bankTotal").innerText=bankTotal.toLocaleString(); document.getElementById("cashTotal").innerText=cashTotal.toLocaleString(); const {bankBalance,cashBalance}=calculateBankCashBalance(); document.getElementById("totalBalance").innerText=(bankBalance+cashBalance).toLocaleString(); updateBankCashUI(); }

    function updateLastModifiedUI() { let lm=localStorage.getItem("bdt_last_modified"); if(lm){let d=new Date(lm); document.getElementById("lastModifiedDisplay").innerHTML=`last sync ${d.toLocaleDateString()} ${d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;}else document.getElementById("lastModifiedDisplay").innerHTML=`last sync just now`; }

    // Safe base64 encode/decode that handles Unicode (Bengali ৳ etc.)
    function toB64(str) { return btoa(unescape(encodeURIComponent(str))); }
    function fromB64(b64) { return decodeURIComponent(escape(atob(b64))); }

    function getToken() { return localStorage.getItem("github_token") || ""; }

    function promptToken() {
        const t = prompt("🔐 Enter your GitHub Personal Access Token (repo scope):\n\nGet one at: github.com → Settings → Developer settings → Personal access tokens\n\nLeave blank to use local-only mode.");
        if(t && t.trim()) { localStorage.setItem("github_token", t.trim()); return t.trim(); }
        return "";
    }

    async function loadFromGitHub() {
        const token = getToken();
        if(!token) return null;
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/data.json`, {
                headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" }
            });
            if(res.status === 401) { localStorage.removeItem("github_token"); setSyncStatus("🔐 token invalid"); return null; }
            if(res.status === 404) return null; // file doesn't exist yet, that's fine
            if(!res.ok) { setSyncStatus("⚠️ fetch error "+res.status); return null; }
            const data = await res.json();
            const content = JSON.parse(fromB64(data.content.replace(/\n/g,"")));
            return { transactions: content.transactions || [], timestamp: content.timestamp || "0", sha: data.sha };
        } catch(e) { setSyncStatus("⚠️ "+e.message); return null; }
    }

    async function saveToGitHub(dataTx, existingSha) {
        const token = getToken();
        if(!token) return false;
        try {
            const payload = JSON.stringify({ transactions: dataTx, timestamp: new Date().toISOString() });
            const encoded = toB64(payload);
            // Always fetch fresh sha to avoid conflicts
            let sha = existingSha || null;
            if(!sha) {
                const check = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/data.json`, {
                    headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" }
                });
                if(check.ok) { const d = await check.json(); sha = d.sha; }
            }
            const body = { message: `bdt-sync ${new Date().toISOString()}`, content: encoded, branch: "main" };
            if(sha) body.sha = sha;
            const resp = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/data.json`, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json", "Accept": "application/vnd.github.v3+json" },
                body: JSON.stringify(body)
            });
            if(resp.status === 401) { localStorage.removeItem("github_token"); setSyncStatus("🔐 token invalid"); return false; }
            if(resp.status === 409) { setSyncStatus("⚠️ conflict — retrying..."); return await saveToGitHub(dataTx, null); } // sha mismatch, retry
            return resp.ok;
        } catch(e) { setSyncStatus("⚠️ save failed"); return false; }
    }

    function setSyncStatus(msg, autoReset=true) {
        const el = document.getElementById("syncStatus");
        el.innerHTML = msg;
        if(autoReset) setTimeout(()=> el.innerHTML = getToken() ? "☁️ auto‑sync" : "💾 local only", 3000);
    }

    async function syncWithCloud() {
        const token = getToken();
        if(!token) { setSyncStatus("💾 local only", false); return; }
        setSyncStatus("⟳ syncing...", false);
        const localTime = localStorage.getItem("bdt_last_modified") || "0";
        try {
            const cloud = await loadFromGitHub();
            if(cloud && cloud.transactions && cloud.transactions.length > 0) {
                const cloudTime = cloud.timestamp || "0";
                if(new Date(cloudTime) > new Date(localTime)) {
                    // Cloud is newer — pull down
                    transactions = cloud.transactions;
                    localStorage.setItem("bdt_money_manager", JSON.stringify(transactions));
                    localStorage.setItem("bdt_last_modified", cloudTime);
                    setSyncStatus("☁️ restored from cloud");
                    renderAll();
                } else {
                    // Local is same or newer — push up
                    const ok = await saveToGitHub(transactions, cloud.sha);
                    setSyncStatus(ok ? "📤 backed up" : "⚠️ backup failed");
                    if(ok) localStorage.setItem("bdt_last_modified", new Date().toISOString());
                }
            } else {
                // No cloud data yet — push local up
                const ok = await saveToGitHub(transactions, null);
                setSyncStatus(ok ? "📤 first upload done" : "⚠️ upload failed");
                if(ok) localStorage.setItem("bdt_last_modified", new Date().toISOString());
            }
        } catch(e) { setSyncStatus("⚠️ sync error"); }
        updateLastModifiedUI();
    }

    function loadFromLocal() { const stored=localStorage.getItem("bdt_money_manager"); if(stored) transactions=JSON.parse(stored); else { const today=new Date().toISOString().slice(0,10); transactions=[{id:Date.now()+1,type:"income",category:"Office",subCategory:"Salary",amount:55000,locationOrMethod:"Bank",date:today},{id:Date.now()+2,type:"expense",category:"Food",subCategory:"Restaurant",amount:1200,locationOrMethod:"Cash",date:today},{id:Date.now()+3,type:"income",category:"DPS",subCategory:"Monthly Deposit",amount:5000,locationOrMethod:"Bank",date:today}]; localStorage.setItem("bdt_money_manager",JSON.stringify(transactions)); localStorage.setItem("bdt_last_modified",new Date().toISOString()); } updateLastModifiedUI(); }
    async function persistLocal() { localStorage.setItem("bdt_money_manager",JSON.stringify(transactions)); localStorage.setItem("bdt_last_modified",new Date().toISOString()); updateLastModifiedUI(); updateStatsUI(); if(getToken()) { const ok=await saveToGitHub(transactions, null); if(!ok) setSyncStatus("⚠️ cloud save failed"); } }

    function addIncome() { let amount=parseFloat(document.getElementById("incomeAmount").value); if(isNaN(amount)||amount<=0) return; transactions.push({id:Date.now(),type:"income",category:document.getElementById("incomeCategory").value,subCategory:document.getElementById("incomeSubCat").value,amount,locationOrMethod:document.getElementById("incomeLocation").value,date:document.getElementById("incomeDate").value||new Date().toISOString().slice(0,10)}); persistLocal(); renderAll(); document.getElementById("incomeAmount").value=""; document.getElementById("incomeCategory").value=""; updateIncomeSubCat(); checkIncomeValid(); }
    function addExpense() { let amount=parseFloat(document.getElementById("expenseAmount").value); if(isNaN(amount)||amount<=0) return; transactions.push({id:Date.now(),type:"expense",category:document.getElementById("expenseCategory").value,subCategory:document.getElementById("expenseSubCat").value,amount,locationOrMethod:document.getElementById("expenseMethod").value,date:document.getElementById("expenseDate").value||new Date().toISOString().slice(0,10)}); persistLocal(); renderAll(); document.getElementById("expenseAmount").value=""; document.getElementById("expenseCategory").value=""; updateExpenseSubCat(); checkExpenseValid(); }
    function deleteTransaction(id) { if(confirm("Remove transaction?")) { transactions=transactions.filter(t=>t.id!==id); persistLocal(); renderAll(); } }
    function startEdit(id) { editModeId=id; renderAll(); }
    function saveEdit(id) { let newAmt=parseFloat(document.getElementById(`edit_amount_${id}`)?.value); if(isNaN(newAmt)||newAmt<=0) return; let txn=transactions.find(t=>t.id===id); if(txn){ txn.amount=newAmt; txn.date=document.getElementById(`edit_date_${id}`)?.value||txn.date; editModeId=null; persistLocal(); renderAll(); } }
    function cancelEdit() { editModeId=null; renderAll(); }

    function getStartOfWeek(date) { let d=new Date(date); let day=d.getDay(); let diff=(day>=5)?(day-5):(day+2); d.setDate(d.getDate()-diff); d.setHours(0,0,0,0); return d; }
    function getFilteredByPeriod(period, typeFilter=currentTypeFilter) { let now=new Date(), start,end; if(period==="daily"){start=new Date(now.getFullYear(),now.getMonth(),now.getDate()); end=new Date(start.getTime()+86400000);} else if(period==="weekly"){start=getStartOfWeek(now); end=new Date(start); end.setDate(start.getDate()+7);} else if(period==="monthly"){start=new Date(now.getFullYear(),now.getMonth(),1); end=new Date(now.getFullYear(),now.getMonth()+1,1);} else {start=new Date(now.getFullYear(),0,1); end=new Date(now.getFullYear()+1,0,1);}
        let filtered=transactions.filter(t=>{let d=new Date(t.date); return d>=start && d<end;});
        if(typeFilter==="income") filtered=filtered.filter(t=>t.type==="income");
        else if(typeFilter==="expense") filtered=filtered.filter(t=>t.type==="expense");
        else filtered=filtered; // "all" includes transfers too
        return filtered;
    }

    // ══ CATEGORY BREAKDOWN LOGIC ══
    function getCatFilteredData(period, type) {
        let now=new Date(), start, end;
        if(period==="daily"){start=new Date(now.getFullYear(),now.getMonth(),now.getDate()); end=new Date(start.getTime()+86400000);}
        else if(period==="weekly"){start=getStartOfWeek(now); end=new Date(start); end.setDate(start.getDate()+7);}
        else if(period==="monthly"){start=new Date(now.getFullYear(),now.getMonth(),1); end=new Date(now.getFullYear(),now.getMonth()+1,1);}
        else {start=new Date(now.getFullYear(),0,1); end=new Date(now.getFullYear()+1,0,1);}
        return transactions.filter(t=>{
            let d=new Date(t.date);
            return d>=start && d<end && t.type===type;
        });
    }

    function buildCatMap(txns) {
        // Returns: { CategoryName: { total: X, subs: { SubName: Y } } }
        const map = {};
        txns.forEach(t => {
            if(!map[t.category]) map[t.category] = { total: 0, subs: {} };
            map[t.category].total += t.amount;
            if(!map[t.category].subs[t.subCategory]) map[t.category].subs[t.subCategory] = 0;
            map[t.category].subs[t.subCategory] += t.amount;
        });
        return map;
    }

    function renderCategoryBreakdown() {
        const txns = getCatFilteredData(catPeriod, catType);
        const catMap = buildCatMap(txns);
        const categories = Object.entries(catMap).sort((a,b) => b[1].total - a[1].total);
        const total = categories.reduce((s,[,v]) => s + v.total, 0);
        const colors = catType === "expense" ? EXPENSE_COLORS : INCOME_COLORS;

        // Summary chips
        const chipsEl = document.getElementById("catSummaryChips");
        const periodLabel = catPeriod.charAt(0).toUpperCase()+catPeriod.slice(1);
        chipsEl.innerHTML = `
            <div class="chip">${catType==="expense"?"📉":"📈"} ${periodLabel} Total: <strong>${total.toLocaleString()} ৳</strong></div>
            <div class="chip">📂 ${categories.length} categories</div>
            <div class="chip">📝 ${txns.length} transactions</div>
        `;

        // Pie chart
        if(catPieChart) catPieChart.destroy();
        const ctx = document.getElementById("catPieChart").getContext("2d");
        if(categories.length === 0) {
            document.getElementById("catBreakdownList").innerHTML = `<div class="cat-empty">No ${catType} data for this period.</div>`;
            document.getElementById("catSubSection").classList.remove("visible");
            return;
        }
        catPieChart = new Chart(ctx, {
            type: "doughnut",
            data: {
                labels: categories.map(([k]) => k),
                datasets: [{
                    data: categories.map(([,v]) => v.total),
                    backgroundColor: categories.map((_,i) => colors[i % colors.length]),
                    borderWidth: 2,
                    borderColor: "#fff",
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                cutout: "60%",
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: ctx => ` ${ctx.label}: ${ctx.parsed.toLocaleString()} ৳ (${((ctx.parsed/total)*100).toFixed(1)}%)`
                        }
                    }
                }
            }
        });

        // Breakdown list
        const listEl = document.getElementById("catBreakdownList");
        listEl.innerHTML = "";
        categories.forEach(([catName, catData], i) => {
            const pct = total > 0 ? ((catData.total / total)*100).toFixed(1) : 0;
            const color = colors[i % colors.length];
            const row = document.createElement("div");
            row.className = "cat-row" + (selectedCatName === catName ? " selected-cat" : "");
            row.innerHTML = `
                <div class="cat-color-dot" style="background:${color}"></div>
                <div class="cat-name">${catName}</div>
                <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${pct}%; background:${color}"></div></div>
                <div class="cat-amount">${catData.total.toLocaleString()} ৳</div>
                <div class="cat-pct">${pct}%</div>
            `;
            row.addEventListener("click", () => {
                if(selectedCatName === catName) {
                    selectedCatName = null;
                    document.getElementById("catSubSection").classList.remove("visible");
                    row.classList.remove("selected-cat");
                } else {
                    selectedCatName = catName;
                    renderSubSection(catName, catData.subs, color);
                    document.querySelectorAll(".cat-row").forEach(r => r.classList.remove("selected-cat"));
                    row.classList.add("selected-cat");
                }
            });
            listEl.appendChild(row);
        });

        // Re-render sub-section if a cat was selected
        if(selectedCatName && catMap[selectedCatName]) {
            const i = categories.findIndex(([k]) => k === selectedCatName);
            renderSubSection(selectedCatName, catMap[selectedCatName].subs, colors[i % colors.length]);
        } else {
            document.getElementById("catSubSection").classList.remove("visible");
        }
    }

    function renderSubSection(catName, subs, color) {
        const subEl = document.getElementById("catSubSection");
        const subEntries = Object.entries(subs).sort((a,b) => b[1]-a[1]);
        const subTotal = subEntries.reduce((s,[,v]) => s+v, 0);
        subEl.innerHTML = `<div class="cat-sub-title">📂 ${catName} — Sub-categories</div>` +
            subEntries.map(([name, amt]) => `
                <div class="sub-row">
                    <span style="display:flex;align-items:center;gap:8px;">
                        <span style="width:7px;height:7px;border-radius:50%;background:${color};display:inline-block;opacity:0.7"></span>
                        ${name}
                    </span>
                    <span style="font-weight:600;">${amt.toLocaleString()} ৳ <span style="color:#8e8e93;font-weight:400;">(${subTotal>0?((amt/subTotal)*100).toFixed(1):0}%)</span></span>
                </div>
            `).join("");
        subEl.classList.add("visible");
    }
    // ══ END CATEGORY BREAKDOWN ══

    function drawBar(incData, expData, labels) {
        const ctx = document.getElementById('barChart').getContext('2d');
        if(barChart) barChart.destroy();
        barChart = new Chart(ctx, {
            type: 'bar',
            data: { labels, datasets: [
                { label:'Income',  data: incData, backgroundColor:'#34c759', borderRadius: 8, barPercentage: 0.7 },
                { label:'Expense', data: expData, backgroundColor:'#ff3b30', borderRadius: 8, barPercentage: 0.7 }
            ]},
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position:'top', labels:{ boxWidth:12, font:{size:11} } } },
                scales: {
                    x: { ticks: { font:{size:10}, maxRotation: 45 } },
                    y: { beginAtZero: true, ticks: { callback: v => v >= 1000 ? (v/1000).toFixed(0)+'k' : v, font:{size:10} } }
                }
            }
        });
    }
    function updateChartAndPeriodStats(period, typeFilter) { const filtered=getFilteredByPeriod(period, typeFilter); if(period==="daily"){ let inc=0,exp=0; filtered.forEach(t=>{if(t.type==="income") inc+=t.amount; else if(t.type==="expense") exp+=t.amount;}); drawBar([inc],[exp],["Today"]); document.getElementById("periodIncome").innerText=inc.toLocaleString(); document.getElementById("periodExpense").innerText=exp.toLocaleString(); document.getElementById("periodSavings").innerText=(inc-exp).toLocaleString(); } else if(period==="weekly"){ let start=getStartOfWeek(new Date()),days=["Fri","Sat","Sun","Mon","Tue","Wed","Thu"]; let incArr=Array(7).fill(0),expArr=Array(7).fill(0); filtered.forEach(t=>{let diff=Math.floor((new Date(t.date)-start)/(86400000)); if(diff>=0&&diff<7){if(t.type==="income") incArr[diff]+=t.amount; else if(t.type==="expense") expArr[diff]+=t.amount;}}); drawBar(incArr,expArr,days); let ti=incArr.reduce((a,b)=>a+b,0),te=expArr.reduce((a,b)=>a+b,0); document.getElementById("periodIncome").innerText=ti.toLocaleString(); document.getElementById("periodExpense").innerText=te.toLocaleString(); document.getElementById("periodSavings").innerText=(ti-te).toLocaleString(); } else if(period==="monthly"){ let dim=new Date(new Date().getFullYear(),new Date().getMonth()+1,0).getDate(); let incArr=Array(dim).fill(0),expArr=Array(dim).fill(0); filtered.forEach(t=>{let day=new Date(t.date).getDate()-1; if(day>=0&&day<dim){if(t.type==="income") incArr[day]+=t.amount; else if(t.type==="expense") expArr[day]+=t.amount;}}); let labels=dim>25?Array.from({length:dim},(_,i)=>i%3===0?(i+1).toString():""):Array.from({length:dim},(_,i)=>(i+1).toString()); drawBar(incArr,expArr,labels); let ti=incArr.reduce((a,b)=>a+b,0),te=expArr.reduce((a,b)=>a+b,0); document.getElementById("periodIncome").innerText=ti.toLocaleString(); document.getElementById("periodExpense").innerText=te.toLocaleString(); document.getElementById("periodSavings").innerText=(ti-te).toLocaleString(); } else { let monthlyInc=Array(12).fill(0),monthlyExp=Array(12).fill(0); filtered.forEach(t=>{let m=new Date(t.date).getMonth(); if(t.type==="income") monthlyInc[m]+=t.amount; else if(t.type==="expense") monthlyExp[m]+=t.amount;}); drawBar(monthlyInc,monthlyExp,["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]); let ti=monthlyInc.reduce((a,b)=>a+b,0),te=monthlyExp.reduce((a,b)=>a+b,0); document.getElementById("periodIncome").innerText=ti.toLocaleString(); document.getElementById("periodExpense").innerText=te.toLocaleString(); document.getElementById("periodSavings").innerText=(ti-te).toLocaleString(); } }

    function renderTransactionTable(period, typeFilter, page=1) {
        let filtered = getFilteredByPeriod(period, typeFilter);
        filtered.sort((a,b) => new Date(b.date) - new Date(a.date));
        const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
        const startIdx = (page-1) * PAGE_SIZE;
        const paginated = filtered.slice(startIdx, startIdx + PAGE_SIZE);
        const tbody = document.getElementById("transactionList");
        const cardList = document.getElementById("txCardList");
        tbody.innerHTML = "";
        cardList.innerHTML = "";

        paginated.forEach(t => {
            const editing = (editModeId === t.id);

            // ── DESKTOP TABLE ROW ──
            const row = tbody.insertRow();
            if(t.type==="transfer") row.className="transfer-row";
            else row.className = t.type==="income" ? "income-row" : "expense-row";

            if(t.type==="transfer") {
                row.insertCell(0).innerText = t.date;
                row.insertCell(1).innerText = "🔄 Transfer";
                row.insertCell(2).innerText = t.locationOrMethod+" → "+t.transferTo;
                row.insertCell(3).innerText = t.subCategory;
                row.insertCell(4).innerText = t.amount.toLocaleString()+" ৳";
                row.insertCell(5).innerHTML = `<button class="mini-btn delete-mini" onclick="deleteTransaction(${t.id})">Del</button>`;
            } else if(editing) {
                row.insertCell(0).innerHTML = `<input type="date" id="edit_date_${t.id}" value="${t.date}" style="width:88px;font-size:0.7rem;">`;
                row.insertCell(1).innerHTML = t.type==="income" ? "📈" : "📉";
                row.insertCell(2).innerHTML = t.category;
                row.insertCell(3).innerHTML = t.subCategory;
                row.insertCell(4).innerHTML = `<input type="number" id="edit_amount_${t.id}" value="${t.amount}" style="width:85px">`;
                row.insertCell(5).innerHTML = `<button class="mini-btn save-mini" onclick="saveEdit(${t.id})">Save</button><button class="mini-btn cancel-mini" onclick="cancelEdit()">Cancel</button>`;
            } else {
                row.insertCell(0).innerText = t.date;
                row.insertCell(1).innerText = t.type==="income" ? "📈 Income" : "📉 Expense";
                row.insertCell(2).innerText = t.category;
                row.insertCell(3).innerText = t.subCategory;
                row.insertCell(4).innerText = t.amount.toLocaleString()+" ৳";
                row.insertCell(5).innerHTML = `<button class="mini-btn edit-mini" onclick="startEdit(${t.id})">Edit</button><button class="mini-btn delete-mini" onclick="deleteTransaction(${t.id})">Del</button>`;
            }

            // ── MOBILE CARD ──
            const card = document.createElement("div");
            const cardType = t.type==="transfer" ? "transfer-card-row" : (t.type==="income" ? "income-card" : "expense-card");
            card.className = "tx-card " + cardType;

            if(t.type==="transfer") {
                card.innerHTML = `
                    <div class="tx-card-top">
                        <span class="tx-card-label trf">🔄 Transfer</span>
                        <span class="tx-card-amount">${t.amount.toLocaleString()} ৳</span>
                    </div>
                    <div class="tx-card-meta">${t.date} &nbsp;·&nbsp; ${t.locationOrMethod} → ${t.transferTo}</div>
                    <div class="tx-card-actions">
                        <button class="tx-del-btn" onclick="deleteTransaction(${t.id})">🗑 Delete</button>
                    </div>`;
            } else if(editing) {
                card.innerHTML = `
                    <div class="tx-card-top">
                        <span class="tx-card-label ${t.type==='income'?'inc':'exp'}">${t.type==='income'?'📈 Income':'📉 Expense'}</span>
                        <span style="font-size:0.72rem;color:#8e8e93;">${t.category} · ${t.subCategory}</span>
                    </div>
                    <div class="tx-edit-row">
                        <input type="number" id="medit_amount_${t.id}" value="${t.amount}" placeholder="Amount">
                        <input type="date"   id="medit_date_${t.id}"   value="${t.date}">
                    </div>
                    <div class="tx-card-actions">
                        <button class="tx-save-btn"   onclick="saveMobileEdit(${t.id})">✓ Save</button>
                        <button class="tx-cancel-btn" onclick="cancelEdit()">✕ Cancel</button>
                    </div>`;
            } else {
                card.innerHTML = `
                    <div class="tx-card-top">
                        <span class="tx-card-label ${t.type==='income'?'inc':'exp'}">${t.type==='income'?'📈 Income':'📉 Expense'}</span>
                        <span class="tx-card-amount">${t.amount.toLocaleString()} ৳</span>
                    </div>
                    <div class="tx-card-meta">${t.date} &nbsp;·&nbsp; ${t.category} → ${t.subCategory}</div>
                    <div class="tx-card-actions">
                        <button class="tx-edit-btn" onclick="startEdit(${t.id})">✏️ Edit</button>
                        <button class="tx-del-btn"  onclick="deleteTransaction(${t.id})">🗑 Delete</button>
                    </div>`;
            }
            cardList.appendChild(card);
        });

        document.getElementById("pageInfo").innerText = `Page ${page} of ${totalPages}`;
        document.getElementById("prevPageBtn").disabled = (page === 1);
        document.getElementById("nextPageBtn").disabled = (page === totalPages);
        currentPage = page;
        updateChartAndPeriodStats(period, typeFilter);
    }

    function saveMobileEdit(id) {
        const newAmt  = parseFloat(document.getElementById(`medit_amount_${id}`)?.value);
        const newDate = document.getElementById(`medit_date_${id}`)?.value;
        if(isNaN(newAmt) || newAmt <= 0) return;
        const txn = transactions.find(t => t.id === id);
        if(txn) { txn.amount = newAmt; if(newDate) txn.date = newDate; editModeId = null; persistLocal(); renderAll(); }
    }

    function setPeriod(period) { currentPeriod=period; document.querySelectorAll(".segment-btn").forEach(btn=>{if(btn.getAttribute("data-period")===period) btn.classList.add("active"); else btn.classList.remove("active");}); currentPage=1; renderTransactionTable(currentPeriod, currentTypeFilter, 1); }
    function setTypeFilter(type) { currentTypeFilter=type; document.querySelectorAll(".type-btn").forEach(btn=>{if(btn.getAttribute("data-type")===type) btn.classList.add("active-type"); else btn.classList.remove("active-type");}); currentPage=1; renderTransactionTable(currentPeriod, currentTypeFilter, 1); }
    function nextPage() { const filtered=getFilteredByPeriod(currentPeriod, currentTypeFilter); const totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1; if(currentPage<totalPages) renderTransactionTable(currentPeriod, currentTypeFilter, currentPage+1); }
    function prevPage() { if(currentPage>1) renderTransactionTable(currentPeriod, currentTypeFilter, currentPage-1); }
    function renderAll() { updateStatsUI(); renderTransactionTable(currentPeriod, currentTypeFilter, currentPage); renderCategoryBreakdown(); }

    // ══ TRANSFER LOGIC ══
    let transferDirection = "bank-to-cash"; // or "cash-to-bank"

    function updateTransferBadges() {
        const fromBadge = document.getElementById("transferFromBadge");
        const toBadge   = document.getElementById("transferToBadge");
        if(transferDirection === "bank-to-cash") {
            fromBadge.className = "transfer-badge bank-b";
            fromBadge.innerHTML = "🏦 Bank<small>From</small>";
            toBadge.className   = "transfer-badge cash-b";
            toBadge.innerHTML   = "💵 Cash<small>To</small>";
        } else {
            fromBadge.className = "transfer-badge cash-b";
            fromBadge.innerHTML = "💵 Cash<small>From</small>";
            toBadge.className   = "transfer-badge bank-b";
            toBadge.innerHTML   = "🏦 Bank<small>To</small>";
        }
        validateTransfer();
    }

    function validateTransfer() {
        const amt  = parseFloat(document.getElementById("transferAmount").value);
        const date = document.getElementById("transferDate").value;
        const errEl = document.getElementById("transferError");
        const btn   = document.getElementById("doTransferBtn");
        if(!amt || amt <= 0 || !date) { btn.disabled = true; errEl.textContent = ""; return; }
        const {bankBalance, cashBalance} = calculateBankCashBalance();
        const sourceBalance = transferDirection === "bank-to-cash" ? bankBalance : cashBalance;
        const sourceName    = transferDirection === "bank-to-cash" ? "Bank" : "Cash";
        if(amt > sourceBalance) {
            errEl.textContent = `⚠️ Insufficient ${sourceName} balance (${sourceBalance.toLocaleString()} ৳ available)`;
            btn.disabled = true;
        } else {
            errEl.textContent = "";
            btn.disabled = false;
        }
    }

    function doTransfer() {
        const amt  = parseFloat(document.getElementById("transferAmount").value);
        const date = document.getElementById("transferDate").value;
        if(!amt || amt <= 0 || !date) return;
        const from = transferDirection === "bank-to-cash" ? "Bank" : "Cash";
        const to   = transferDirection === "bank-to-cash" ? "Cash" : "Bank";
        const ts   = Date.now();
        // Two paired entries — one debit, one credit — linked by a transferId
        const transferId = ts;
        transactions.push({
            id: ts,
            type: "transfer",
            category: "Transfer",
            subCategory: `${from} → ${to}`,
            amount: amt,
            locationOrMethod: from,
            transferTo: to,
            transferId,
            date
        });
        persistLocal();
        renderAll();
        document.getElementById("transferAmount").value = "";
        document.getElementById("transferError").textContent = "";
        document.getElementById("doTransferBtn").disabled = true;
        // Flash confirmation
        const btn = document.getElementById("doTransferBtn");
        const orig = btn.textContent;
        btn.textContent = "✓ Done!";
        btn.style.background = "#34c759";
        setTimeout(() => { btn.textContent = orig; btn.style.background = ""; }, 1800);
    }
    // ══ END TRANSFER LOGIC ══

    document.addEventListener("DOMContentLoaded", async () => {
        loadFromLocal();
        let today=new Date().toISOString().slice(0,10);
        if(!document.getElementById("incomeDate").value) document.getElementById("incomeDate").value=today;
        if(!document.getElementById("expenseDate").value) document.getElementById("expenseDate").value=today;
        updateIncomeSubCat(); updateExpenseSubCat();
        document.getElementById("incomeCategory").addEventListener("change",()=>{updateIncomeSubCat();checkIncomeValid();});
        document.getElementById("incomeSubCat").addEventListener("change",checkIncomeValid);
        document.getElementById("incomeAmount").addEventListener("input",checkIncomeValid);
        document.getElementById("incomeDate").addEventListener("change",checkIncomeValid);
        document.getElementById("expenseCategory").addEventListener("change",()=>{updateExpenseSubCat();checkExpenseValid();});
        document.getElementById("expenseSubCat").addEventListener("change",checkExpenseValid);
        document.getElementById("expenseAmount").addEventListener("input",checkExpenseValid);
        document.getElementById("expenseDate").addEventListener("change",checkExpenseValid);
        document.getElementById("addIncomeBtn").addEventListener("click",addIncome);
        document.getElementById("addExpenseBtn").addEventListener("click",addExpense);
        document.querySelectorAll(".segment-btn").forEach(btn=>btn.addEventListener("click",()=>setPeriod(btn.getAttribute("data-period"))));
        document.querySelectorAll(".type-btn").forEach(btn=>btn.addEventListener("click",()=>setTypeFilter(btn.getAttribute("data-type"))));

        // Category filter controls
        document.querySelectorAll(".cat-period-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                catPeriod = btn.getAttribute("data-cat-period");
                selectedCatName = null;
                document.querySelectorAll(".cat-period-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                renderCategoryBreakdown();
            });
        });
        document.querySelectorAll(".cat-type-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                catType = btn.getAttribute("data-cat-type");
                selectedCatName = null;
                document.querySelectorAll(".cat-type-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                renderCategoryBreakdown();
            });
        });

        document.getElementById("forceSyncBtn").addEventListener("click", async () => {
            if(!getToken()) {
                const t = promptToken();
                if(!t) { setSyncStatus("💾 local only", false); return; }
            }
            await syncWithCloud();
        });

        // Transfer controls
        document.getElementById("transferSwapBtn").addEventListener("click", () => {
            const btn = document.getElementById("transferSwapBtn");
            btn.classList.toggle("flipped");
            transferDirection = transferDirection === "bank-to-cash" ? "cash-to-bank" : "bank-to-cash";
            updateTransferBadges();
        });
        document.getElementById("transferAmount").addEventListener("input", validateTransfer);
        document.getElementById("transferDate").addEventListener("change", validateTransfer);
        document.getElementById("doTransferBtn").addEventListener("click", doTransfer);
        document.getElementById("transferDate").value = today;
        updateTransferBadges();
        document.getElementById("exportBtn").addEventListener("click",()=>{let dataStr=JSON.stringify(transactions,null,2); let blob=new Blob([dataStr],{type:"application/json"}); let a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=`bdt_backup_${today}.json`; a.click(); URL.revokeObjectURL(blob);});
        document.getElementById("importBtn").addEventListener("click",()=>{let inp=document.createElement("input"); inp.type="file"; inp.accept="application/json"; inp.onchange=e=>{let f=e.target.files[0]; if(!f) return; let rd=new FileReader(); rd.onload=async ev=>{try{let imp=JSON.parse(ev.target.result); transactions=Array.isArray(imp)?imp:imp.transactions||[]; await persistLocal(); renderAll(); alert("✓ imported");}catch(e){alert("invalid file");}}; rd.readAsText(f);}; inp.click();});
        document.getElementById("prevPageBtn").addEventListener("click",prevPage);
        document.getElementById("nextPageBtn").addEventListener("click",nextPage);
        checkIncomeValid(); checkExpenseValid(); renderAll();
        // Show correct initial badge
        document.getElementById("syncStatus").innerHTML = getToken() ? "☁️ auto‑sync" : "💾 local only";
        // Only auto-sync if token already saved — never prompt silently on load
        if(getToken()) await syncWithCloud();
    });
</script>
</body>
</html>
